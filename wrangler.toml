name = "photobss"
main = "cloudflare-worker.mjs"
compatibility_date = "2026-05-17"

[[kv_namespaces]]
binding = "DATA"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/", "/admin.html", "/s/*", "/api/*"]
