services:
  - type: web
    name: webrr
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_PHOTOS_CLIENT_ID
        sync: false
      - key: GOOGLE_PHOTOS_CLIENT_SECRET
        sync: false
      - key: GOOGLE_PHOTOS_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_PHOTOS_ALBUM_ID
        sync: false
